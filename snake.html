<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, Helvetica, sans-serif;
    }
    .wrap {
      width: min(92vw, 520px);
      text-align: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 1.25rem;
    }
    h1 { margin-top: 0; }
    p { color: #94a3b8; }
    canvas {
      background: #020617;
      border: 2px solid #38bdf8;
      border-radius: 12px;
      max-width: 100%;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    a, button {
      background: #38bdf8;
      color: #001018;
      border: 0;
      border-radius: 999px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .hint { font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Snake</h1>
    <p>Use the arrow keys or WASD to move. Tap restart if you crash.</p>
    <div class="row">
      <strong>Score: <span id="score">0</span></strong>
      <div>
        <a href="index.html">Back Home</a>
        <button id="restart">Restart</button>
      </div>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <p class="hint">Eat the red food. Do not run into the walls or yourself.</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    let snake, dx, dy, food, score, gameOver;

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      dx = 1;
      dy = 0;
      food = randomFood();
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;
    }

    function randomFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake && snake.some(part => part.x === pos.x && part.y === pos.y));
      return pos;
    }

    function drawTile(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * gridSize + 1, y * gridSize + 1, gridSize - 2, gridSize - 2);
    }

    function update() {
      if (gameOver) return;

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      if (
        head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        food = randomFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawTile(food.x, food.y, '#ef4444');
      snake.forEach((part, index) => drawTile(part.x, part.y, index === 0 ? '#38bdf8' : '#22c55e'));

      if (gameOver) {
        ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = '18px Arial';
        ctx.fillText('Press Restart to play again', canvas.width / 2, canvas.height / 2 + 24);
      }
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if ((key === 'arrowup' || key === 'w') && dy !== 1) { dx = 0; dy = -1; }
      else if ((key === 'arrowdown' || key === 's') && dy !== -1) { dx = 0; dy = 1; }
      else if ((key === 'arrowleft' || key === 'a') && dx !== 1) { dx = -1; dy = 0; }
      else if ((key === 'arrowright' || key === 'd') && dx !== -1) { dx = 1; dy = 0; }
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
      draw();
    });

    resetGame();
    draw();
    setInterval(update, 120);
  </script>
</body>
</html>
